<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الطالب</title>
    <style>
        body {
            font-family: "Tajawal", sans-serif;
            background-color: #f7f9fc;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4a90e2;
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 26px;
        }
        .container {
            width: 60%;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px #ddd;
        }
        label {
            font-size: 18px;
            margin-top: 10px;
            display: block;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #4a90e2;
            text-decoration: none;
        }
    </style>
</head>
<body>

<header>تسجيل الطالب</header>

<div class="container">
    <label>اسم الطالب</label>
    <input type="text">

    <label>الصف الدراسي</label>
    <select>
        <option>الصف الأول</option>
        <option>الصف الثاني</option>
        <option>الصف الثالث</option>
        <option>الصف الرابع</option>
        <option>الصف الخامس</option>
        <option>الصف السادس</option>
    </select>

    <label>رقم ولي الأمر</label>
    <input type="text">

    <button>تسجيل</button>

    <a href="index.html">العودة للصفحة الرئيسية</a>
</div>

</body>
</html>
