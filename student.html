<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الرحلة</title>

    <style>
        body {
            margin: 0;
            font-family: "Tajawal", sans-serif;
            background: linear-gradient(135deg, #1e90ff, #7ed957, #ffdd57);
            background-size: 300% 300%;
            animation: gradientMove 12s ease infinite;
            color: #fff;
            padding-top: 90px;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .topbar {
            width: 100%;
            height: 75px;
            background-color: #FFF3B0;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 25px;
            position: fixed;
            top: 0;
            right: 0;
            z-index: 9999;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .logo {
            height: 60px;
            cursor: pointer;
        }

        .section {
            width: 80%;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.18);
            padding: 35px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        input, select {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            font-size: 18px;
        }

        .btn-main {
            padding: 15px 35px;
            background: #ffffff;
            color: #1e90ff;
            font-size: 22px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-main:hover {
            transform: scale(1.07);
            background: #e8f4ff;
        }
    </style>
</head>

<body>

<div class="topbar">
    <a href="index.html">
        <img src="https://raw.githubusercontent.com/mina-wep/-/refs/heads/main/WhatsApp%20Image%202026-04-16%20at%202.24.43%20AM.jpeg" class="logo">
    </a>
</div>

<div class="section">
    <h1>تسجيل الرحلة</h1>

    <input type="text" placeholder="اسم الطالب">
    <input type="text" placeholder="الصف الدراسي">
    <input type="text" placeholder="عنوان المنزل">
    <select>
        <option>اختر الفترة</option>
        <option>صباحية</option>
        <option>مسائية</option>
    </select>

    <button class="btn-main">تسجيل</button>
</div>

</body>
</html>
