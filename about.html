<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عن المشروع</title>
    <style>
        body {
            font-family: "Tajawal", sans-serif;
            background-color: #f7f9fc;
            margin: 0;
        }
        header {
            background-color: #4a90e2;
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 26px;
        }
        .content {
            width: 70%;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px #ddd;
            font-size: 20px;
            line-height: 1.8;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #4a90e2;
            text-decoration: none;
        }
    </style>
</head>
<body>

<header>عن مشروع حافلتي</header>

<div class="content">
    <p>
        مشروع "حافلتي" هو نظام بسيط يساعد المدرسة وولي الأمر على متابعة تسجيل الطلاب
        وتنظيم عملية النقل المدرسي بطريقة سهلة وواضحة.
    </p>

    <p>
        يهدف المشروع إلى توفير تجربة آمنة وسهلة للطلاب، مع واجهة بسيطة وسريعة الاستخدام.
    </p>

    <a href="index.html">العودة للصفحة الرئيسية</a>
</div>

</body>
</html>
