<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل دخول المشرفة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: "Tajawal", sans-serif;
      background: #f5f7fb;
      color: #0b1b3b;
      text-align: center;
    }

    /* الهيدر */
    header {
      background:#0b113b;
      padding:14px 0;
      box-shadow:0 0 25px rgba(0,0,0,0.35);
      position:sticky;
      top:0;
      z-index:999;
    }

    .nav {
      max-width:1100px;
      margin:0 auto;
      padding:0 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      color:#fff;
    }

    .logo img {
      height:auto;
      width:auto;
      max-height:80px;
      object-fit:contain;
      border-radius:0;
      background:none;
      padding:0;
      box-shadow:none;
    }

    .nav_links {
      display:flex;
      align-items:center;
      gap:20px;
    }

    .nav_links a {
      color:#fff;
      text-decoration:none;
      font-size:15px;
      opacity:0.9;
      transition:0.25s;
    }

    .nav_links a:hover {
      opacity:1;
    }

    .btn-login-nav {
      padding:8px 18px;
      background:#ffc928;
      border:none;
      border-radius:20px;
      font-size:14px;
      font-weight:700;
      color:#0b113b;
      cursor:pointer;
      transition:0.25s;
    }

    .btn-login-nav:hover {
      opacity:0.9;
    }

    /* نموذج المشرفة */
    .container {
      max-width: 400px;
      margin: 100px auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      background: #ffc928;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      color: #0b1b3b;
      cursor: pointer;
      transition: 0.2s;
      width: 200px;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <!-- الهيدر الجديد -->
  <header>
    <div class="nav">

      <div class="logo" onclick="location.href='index.html'">
        <img src="https://raw.githubusercontent.com/mina-wep/mina-wep.github.io/refs/heads/main/WhatsApp%20Image%202026-04-22%20at%202.38.28%20PM.jpeg">
      </div>

      <div class="nav_links">
        <a href="index.html">الصفحة الرئيسية</a>
        <a href="tracking.html">تتبع مباشر</a>
        <a href="routes.html">المسارات</a>
        <a href="register.html">التسجيل</a>
        <a href="support.html">الدعم</a>
        <button onclick="location.href='login.html'" class="btn-login-nav">الدخول</button>
      </div>

    </div>
  </header>

  <!-- نموذج تسجيل دخول المشرفة -->
  <div class="container">
    <h2>تسجيل دخول المشرفة</h2>
    <p style="opacity:0.7;">الرجاء إدخال كلمة المرور</p>

    <input type="password" id="adminPass" placeholder="كلمة المرور">

    <button onclick="login()">دخول</button>
  </div>

  <script>
    function login() {
      const pass = document.getElementById("adminPass").value;

      const correctPass = "12345"; // تقدرين تغيرينها

      if (pass === correctPass) {
        location.href = "complaints.html";
      } else {
        alert("كلمة المرور غير صحيحة");
      }
    }
  </script>

</body>
</html>
