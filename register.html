<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>إنشاء حساب - حافلتي</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: "Tajawal", sans-serif;
      background: #f5f7fb;
      color: #0b1b3b;
      text-align: center;
    }

    .container {
      max-width: 450px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .btn-register {
      margin-top: 20px;
      padding: 12px 25px;
      background: #ffc928;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      color: #0b1b3b;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-register:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>إنشاء حساب جديد</h2>

    <input id="name" type="text" placeholder="الاسم الكامل">
    <input id="email" type="email" placeholder="البريد الإلكتروني">
    <input id="phone" type="text" placeholder="رقم الجوال">
    <input id="address" type="text" placeholder="العنوان">

    <button class="btn-register" onclick="saveUser()">إنشاء المستخدم</button>
  </div>

  <script>
    function saveUser() {
      // حفظ بيانات المستخدم
      localStorage.setItem("userName", document.getElementById('name').value);
      localStorage.setItem("userEmail", document.getElementById('email').value);
      localStorage.setItem("userPhone", document.getElementById('phone').value);
      localStorage.setItem("userAddress", document.getElementById('address').value);

      // إشارة أنه تم التسجيل
      localStorage.setItem("justRegistered", "yes");

      // الانتقال لصفحة النجاح
      location.href = "succss.html";
    }
  </script>

</body>
</html>
