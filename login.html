<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول - حافلتي</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: "Tajawal", sans-serif;
      background: #f5f7fb;
      color: #0b1b3b;
    }

    /* الهيدر */
    header {
      background:#0b113b;
      padding:14px 0;
      box-shadow:0 0 25px rgba(0,0,0,0.35);
      position:sticky;
      top:0;
      z-index:999;
    }

    .nav {
      max-width:1100px;
      margin:0 auto;
      padding:0 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      color:#fff;
    }

    .logo img {
      height:auto;
      width:auto;
      max-height:80px;
      object-fit:contain;
      border-radius:0;
      background:none;
      padding:0;
      box-shadow:none;
    }

    .nav_links {
      display:flex;
      align-items:center;
      gap:20px;
    }

    .nav_links a {
      color:#fff;
      text-decoration:none;
      font-size:15px;
      opacity:0.9;
      transition:0.25s;
    }

    .nav_links a:hover {
      opacity:1;
    }

    .btn-login-nav {
      padding:8px 18px;
      background:#ffc928;
      border:none;
      border-radius:20px;
      font-size:14px;
      font-weight:700;
      color:#0b113b;
      cursor:pointer;
      transition:0.25s;
    }

    .btn-login-nav:hover {
      opacity:0.9;
    }

    /* نموذج تسجيل الدخول */
    .login-container {
      max-width: 420px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    .input-group {
      text-align: right;
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 600;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 15px;
      outline: none;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: #ffc928;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      color: #0b1b3b;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <!-- الهيدر الجديد -->
  <header>
    <div class="nav">

      <div class="logo" onclick="location.href='index.html'">
        <img src="https://raw.githubusercontent.com/mina-wep/mina-wep.github.io/refs/heads/main/WhatsApp%20Image%202026-04-22%20at%202.38.28%20PM.jpeg">
      </div>

      <div class="nav_links">
        <a href="index.html">الصفحة الرئيسية</a>
        <a href="tracking.html">تتبع مباشر</a>
        <a href="routes.html">المسارات</a>
        <a href="register.html">التسجيل</a>
        <a href="support.html">الدعم</a>
        <button onclick="location.href='login.html'" class="btn-login-nav">الدخول</button>
      </div>

    </div>
  </header>

  <!-- نموذج تسجيل الدخول -->
  <div class="login-container">
    <h2>تسجيل الدخول</h2>

    <div class="input-group">
      <label>البريد الإلكتروني</label>
      <input id="email" type="email" placeholder="example@email.com">
    </div>

    <button class="btn-login" onclick="loginUser()">تسجيل الدخول</button>

    <script>
      function loginUser() {
        localStorage.setItem("userEmail", document.getElementById('email').value);
        location.href = "dashboard.html";
      }
    </script>
  </div>

</body>
</html>
