<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تم التسجيل بنجاح - حافلتي</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: "Tajawal", sans-serif;
      background: #f5f7fb;
      color: #0b1b3b;
      text-align: center;
    }

    /* الهيدر */
    header {
      background:#0b113b;
      padding:14px 0;
      box-shadow:0 0 25px rgba(0,0,0,0.35);
      position:sticky;
      top:0;
      z-index:999;
    }

    .nav {
      max-width:1100px;
      margin:0 auto;
      padding:0 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      color:#fff;
    }

    .logo img {
      height:auto;
      width:auto;
      max-height:80px;
      object-fit:contain;
      border-radius:0;
      background:none;
      padding:0;
      box-shadow:none;
    }

    .nav_links {
      display:flex;
      align-items:center;
      gap:20px;
    }

    .nav_links a {
      color:#fff;
      text-decoration:none;
      font-size:15px;
      opacity:0.9;
      transition:0.25s;
    }

    .nav_links a:hover {
      opacity:1;
    }

    .btn-login-nav {
      padding:8px 18px;
      background:#ffc928;
      border:none;
      border-radius:20px;
      font-size:14px;
      font-weight:700;
      color:#0b113b;
      cursor:pointer;
      transition:0.25s;
    }

    .btn-login-nav:hover {
      opacity:0.9;
    }

    /* صفحة النجاح */
    .container {
      max-width: 500px;
      margin: 100px auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      animation: fadeIn 0.8s ease;
    }

    .icon {
      font-size: 70px;
      color: #28a745;
      margin-bottom: 20px;
      animation: pop 0.6s ease;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 25px;
      background: #ffc928;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      color: #0b1b3b;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

<body>

  <!-- الهيدر -->
  <header>
    <div class="nav">

      <div class="logo" onclick="location.href='index.html'">
        <img src="https://raw.githubusercontent.com/mina-wep/mina-wep.github.io/refs/heads/main/WhatsApp%20Image%202026-04-22%20at%202.38.28%20PM.jpeg">
      </div>

      <div class="nav_links">
        <a href="index.html">الصفحة الرئيسية</a>
        <a href="tracking.html">تتبع مباشر</a>
        <a href="routes.html">المسارات</a>
        <a href="register.html">التسجيل</a>
        <a href="support.html">الدعم</a>
        <button onclick="location.href='login.html'" class="btn-login-nav">الدخول</button>
      </div>

    </div>
  </header>

  <!-- محتوى صفحة النجاح -->
  <div class="container">

   <div class="bus-icon">🚌</div>
    <div class="icon">✔</div>

    <h2>تم التسجيل بنجاح!</h2>

    <p style="font-size:17px; margin-top:10px;">
      أهلاً بك في حافلتي، تم إنشاء حسابك بنجاح.
    </p>

    <button class="btn" onclick="location.href='dashboard.html'">
      الانتقال إلى لوحة المستخدم
    </button>

  </div>

</body>
</html>
