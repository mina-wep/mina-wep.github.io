<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تم التسجيل بنجاح - حافلتي</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: "Tajawal", sans-serif;
      background: #f5f7fb;
      color: #0b1b3b;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: 100px auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      animation: fadeIn 0.8s ease;
    }

    .bus-icon {
      font-size: 60px;
      margin-bottom: 10px;
      color: #ffc928;
      animation: pop 0.6s ease;
    }

    .icon {
      font-size: 70px;
      color: #28a745;
      margin-bottom: 20px;
      animation: pop 0.6s ease;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 25px;
      background: #ffc928;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      color: #0b1b3b;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="bus-icon">🚌</div>

    <div class="icon">✔</div>

    <h2>تم التسجيل بنجاح!</h2>

    <p style="font-size:17px; margin-top:10px;">
      أهلاً بك في حافلتي، تم إنشاء حسابك بنجاح.
    </p>

    <button class="btn" onclick="location.href='dashboard.html'">
      الانتقال إلى لوحة المستخدم
    </button>

  </div>

</body>
</html>
