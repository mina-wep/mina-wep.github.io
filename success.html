<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تم التسجيل بنجاح</title>

    <style>
        body {
            margin: 0;
            font-family: "Tajawal", sans-serif;
            background: linear-gradient(135deg, #1e90ff, #7ed957, #ffdd57);
            background-size: 300% 300%;
            animation: gradientMove 12s ease infinite;
            color: #fff;
            padding-top: 90px;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* الشريط العلوي */
        .topbar {
            width: 100%;
            height: 75px;
            background-color: #FFF3B0;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 25px;
            position: fixed;
            top: 0;
            right: 0;
            z-index: 9999;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .logo {
            height: 60px;
            cursor: pointer;
        }

        /* صندوق المحتوى */
        .section {
            width: 80%;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.18);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 {
            font-size: 40px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        p {
            font-size: 22px;
            margin-bottom: 30px;
        }

        .btn-main {
            padding: 15px 35px;
            background: #ffffff;
            color: #1e90ff;
            font-size: 22px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-main:hover {
            transform: scale(1.07);
            background: #e8f4ff;
        }
    </style>
</head>

<body>

<!-- الشريط العلوي -->
<div class="topbar">
    <a href="index.html">
        <img src="https://raw.githubusercontent.com/mina-wep/-/refs/heads/main/WhatsApp%20Image%202026-04-16%20at%202.24.43%20AM.jpeg" class="logo">
    </a>
</div>

<!-- المحتوى -->
<div class="section">
    <h1>تم التسجيل بنجاح ✔️</h1>
    <p>شكراً لك، تم حفظ بيانات الرحلة بنجاح.</p>

    <a href="index.html" class="btn-main">العودة للصفحة الرئيسية</a>
</div>

</body>
</html>
