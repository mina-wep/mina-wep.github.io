<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تواصل معنا - حافلتي</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: "Tajawal", sans-serif;
      background: #f5f7fb;
      color: #0b1b3b;
    }

    /* الهيدر */
    header {
      background:#0b113b;
      padding:14px 0;
      box-shadow:0 0 25px rgba(0,0,0,0.35);
      position:sticky;
      top:0;
      z-index:999;
    }

    .nav {
      max-width:1100px;
      margin:0 auto;
      padding:0 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      color:#fff;
    }

    .logo img {
      max-height:80px;
      object-fit:contain;
    }

    .nav_links {
      display:flex;
      align-items:center;
      gap:20px;
    }

    .nav_links a {
      color:#fff;
      text-decoration:none;
      font-size:15px;
      opacity:0.9;
      transition:0.25s;
    }

    .nav_links a:hover {
      opacity:1;
    }

    .btn-login-nav {
      padding:8px 18px;
      background:#ffc928;
      border:none;
      border-radius:20px;
      font-size:14px;
      font-weight:700;
      color:#0b113b;
      cursor:pointer;
    }

    /* نموذج التواصل */
    .container {
      max-width: 500px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    input, textarea, select {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      color: #0b1b3b;
    }

    textarea {
      height: 120px;
      resize: none;
    }

    .btn-send, .btn-home {
      margin-top: 20px;
      padding: 12px 25px;
      background: #ffc928;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      color: #0b1b3b;
      cursor: pointer;
      width: 200px;
      margin-left: auto;
      margin-right: auto;
    }

    /* صندوق النجاح */
    #successBox {
      display:none;
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 8px 25px rgba(0,0,0,0.2);
      text-align:center;
      width:300px;
      z-index:9999;
    }
  </style>
</head>

<body>

  <!-- الهيدر -->
  <header>
    <div class="nav">

      <div class="logo" onclick="location.href='index.html'">
        <img src="https://raw.githubusercontent.com/mina-wep/mina-wep.github.io/refs/heads/main/WhatsApp%20Image%202026-04-22%20at%202.38.28%20PM.jpeg">
      </div>

      <div class="nav_links">
        <a href="index.html">الصفحة الرئيسية</a>
        <a href="tracking.html">تتبع مباشر</a>
        <a href="routes.html">المسارات</a>
        <a href="register.html">التسجيل</a>
        <a href="support.html">الدعم</a>
        <button onclick="location.href='login.html'" class="btn-login-nav">الدخول</button>
      </div>

    </div>
  </header>

  <!-- نموذج التواصل -->
  <div class="container">
    <h2>تواصل معنا</h2>
    <p style="opacity:0.8; margin-bottom:20px;">
      يسعدنا تواصلك معنا في أي وقت
    </p>

    <input type="text" id="name" placeholder="الاسم الكامل">
    <input type="email" id="email" placeholder="البريد الإلكتروني">

    <select id="bus">
      <option value="">اختر الباص</option>
      <option value="باص حي المشهد">باص حي المشهد</option>
      <option value="باص حي السميري">باص حي السميري</option>
      <option value="باص حي العصيلي">باص حي العصيلي</option>
      <option value="باص حي الزهرة">باص حي الزهرة</option>
      <option value="باص حي الروضة">باص حي الروضة</option>
    </select>

    <textarea id="message" placeholder="اكتب رسالتك هنا..."></textarea>

    <button class="btn-send" onclick="sendMessage()">إرسال ملاحظتك</button>

    <button class="btn-home" onclick="location.href='index.html'">العودة للصفحة الرئيسية</button>
  </div>

  <!-- صندوق النجاح -->
  <div id="successBox">
    <h3 style="margin-bottom:10px;">تم إرسال ملاحظتك بنجاح!</h3>

    <button onclick="location.href='index.html'"
            style="padding:10px 20px; background:#ffc928; border:none; border-radius:25px;
            font-size:15px; font-weight:bold; color:#0b1b3b; cursor:pointer;">
      العودة للصفحة الرئيسية
    </button>
  </div>

  <script>
    function sendMessage() {
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const bus = document.getElementById("bus").value;
      const message = document.getElementById("message").value;

      if (!name || !email || !bus || !message) {
        alert("الرجاء تعبئة جميع الحقول");
        return;
      }

      const complaint = {
        name: name,
        email: email,
        bus: bus,
        message: message,
        date: new Date().toLocaleString("ar-SA")
      };

      let list = JSON.parse(localStorage.getItem("complaintsList")) || [];
      list.push(complaint);
      localStorage.setItem("complaintsList", JSON.stringify(list));

      // إظهار رسالة النجاح
      document.getElementById("successBox").style.display = "block";
    }
  </script>

</body>
</html>
